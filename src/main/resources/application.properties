# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── DataSource (PostgreSQL - Railway) ───────────────────────────────────────
# Railway injeta DATABASE_URL no formato postgresql://user:pass@host:port/db
# Spring precisa do formato jdbc:postgresql://host:port/db
# A variável JDBC_DATABASE_URL abaixo é construída manualmente no Railway
# OU use a variável DATABASE_URL com o prefixo corrigido abaixo:
spring.datasource.url=${JDBC_DATABASE_URL:${DATABASE_URL}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:#{null}}
spring.datasource.password=${DATABASE_PASSWORD:#{null}}

# ─── JPA ──────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ─── RabbitMQ ─────────────────────────────────────────────────────────────────
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# ─── Mensageria ───────────────────────────────────────────────────────────────
role.messaging.exchange=role.exchange
role.messaging.queue=role.presenca.queue
role.messaging.routing-key=presenca.confirmada


# ─── Seed passwords ───────────────────────────────────────────────────────────
app.seed.admin-password=${ADMIN_PASSWORD:admin@Role2025}
app.seed.user-password=${USER_PASSWORD:user@Role2025}
