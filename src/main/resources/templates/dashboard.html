<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head}"><title>Dashboard</title></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <h1>Ola, <span sec:authentication="name"></span></h1>
    <div class="stats">
        <div class="stat-card">
            <div class="number" th:text="${#lists.size(eventos)}"></div>
            <div class="label">Eventos disponiveis</div>
        </div>
    </div>
    <div class="page-header">
        <h2>Proximos eventos</h2>
        <a href="/eventos" class="btn btn-primary">Ver todos</a>
    </div>
    <div class="eventos-grid">
        <div class="evento-card" th:each="evento : ${eventos}">
            <div class="evento-card-header"><h3 th:text="${evento.titulo}"></h3></div>
            <div class="evento-card-body">
                <p>Local: <span th:text="${evento.local.nome}"></span></p>
                <p>Data: <span th:text="${#temporals.format(evento.inicio, 'dd/MM/yyyy HH:mm')}"></span></p>
                <p th:text="${#strings.abbreviate(evento.descricao, 90)}"></p>
            </div>
            <div class="evento-card-footer">
                <span class="vagas" th:text="'Vagas: ' + ${evento.vagasDisponiveis} + '/' + ${evento.vagasTotais}"></span>
                <a th:href="@{/eventos/{id}(id=${evento.id})}" class="btn btn-primary btn-sm">Ver mais</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
