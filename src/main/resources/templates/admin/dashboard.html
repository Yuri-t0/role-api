<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"><title>Admin</title></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <h1>Painel Admin</h1>
    <div class="stats">
        <div class="stat-card"><div class="number" th:text="${totalUsuarios}"></div><div class="label">Usuarios</div></div>
        <div class="stat-card"><div class="number" th:text="${totalEventos}"></div><div class="label">Eventos</div></div>
        <div class="stat-card"><div class="number" th:text="${totalPresencas}"></div><div class="label">Presencas</div></div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;">
        <a href="/admin/eventos" class="card" style="text-decoration:none;text-align:center;color:#333;"><div style="font-size:2rem;">Eventos</div></a>
        <a href="/admin/usuarios" class="card" style="text-decoration:none;text-align:center;color:#333;"><div style="font-size:2rem;">Usuarios</div></a>
        <a href="/admin/processamentos" class="card" style="text-decoration:none;text-align:center;color:#333;"><div style="font-size:2rem;">RabbitMQ</div></a>
        <a href="/h2-console" target="_blank" class="card" style="text-decoration:none;text-align:center;color:#333;"><div style="font-size:2rem;">Banco H2</div></a>
    </div>
</div>
</body>
</html>
