<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}">
    <title>Login</title>
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container" style="max-width:420px;">
    <div class="card" style="margin-top:4rem;">
        <h2 style="text-align:center; margin-bottom:1.5rem;">Entrar</h2>
        <div class="alert alert-success" th:if="${param.cadastrado}">Cadastro realizado! Faca login para continuar.</div>
        <div class="alert alert-danger"  th:if="${param.error}">Email ou senha incorretos.</div>
        <div class="alert alert-success" th:if="${param.logout}">Voce saiu com sucesso.</div>
        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="username" placeholder="seu@email.com" required autofocus/>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" name="password" placeholder="senha" required/>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">Entrar</button>
        </form>
        <p style="text-align:center; margin-top:1rem; font-size:0.9rem; color:#666;">
            Nao tem conta? <a href="/cadastro" style="color:#e94560;">Cadastre-se</a>
        </p>
    </div>
</div>
</body>
</html>
