<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}">
    <title>Role - Inicio</title>
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container">
    <div style="text-align:center; padding: 3rem 0 2rem;">
        <h1 style="font-size:2.5rem; color:#1a1a2e;">Bem-vindo ao <span style="color:#e94560;">Role</span></h1>
        <p style="color:#666; margin-top:0.5rem;">Descubra e gerencie eventos incriveis</p>
        <a href="/eventos" class="btn btn-primary" style="margin-top:1.5rem; font-size:1rem; padding:0.7rem 2rem;">Ver Eventos</a>
    </div>
    <h2>Proximos eventos</h2>
    <div class="eventos-grid">
        <div class="evento-card" th:each="evento : ${eventos}">
            <div class="evento-card-header"><h3 th:text="${evento.titulo}"></h3></div>
            <div class="evento-card-body">
                <p>Local: <span th:text="${evento.local.nome}"></span></p>
                <p>Data: <span th:text="${#temporals.format(evento.inicio, 'dd/MM/yyyy HH:mm')}"></span></p>
                <p th:text="${#strings.abbreviate(evento.descricao, 100)}"></p>
            </div>
            <div class="evento-card-footer">
                <span class="vagas" th:text="'Vagas: ' + ${evento.vagasDisponiveis} + '/' + ${evento.vagasTotais}"></span>
                <a th:href="@{/eventos/{id}(id=${evento.id})}" class="btn btn-primary btn-sm">Ver mais</a>
            </div>
        </div>
    </div>
    <div th:if="${#lists.isEmpty(eventos)}" class="card" style="text-align:center;color:#888;">Nenhum evento disponivel.</div>
</div>
</body>
</html>
