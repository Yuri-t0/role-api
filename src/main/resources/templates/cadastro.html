<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}">
    <title>Cadastro</title>
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<div class="container" style="max-width:480px;">
    <div class="card" style="margin-top:3rem;">
        <h2 style="text-align:center; margin-bottom:1.5rem;">Criar conta</h2>
        <div class="alert alert-danger" th:if="${erro}" th:text="${erro}"></div>
        <form th:action="@{/cadastro}" method="post" th:object="${usuario}">
            <div class="form-group">
                <label>Nome completo</label>
                <input type="text" th:field="*{nome}" placeholder="Seu nome" required/>
                <span class="error-msg" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}" placeholder="seu@email.com" required/>
                <span class="error-msg" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>
            <div class="form-group">
                <label>Telefone</label>
                <input type="text" th:field="*{telefone}" placeholder="(11) 99999-0000" required/>
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" th:field="*{senha}" placeholder="Minimo 6 caracteres" required/>
                <span class="error-msg" th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}"></span>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem;">Criar conta</button>
        </form>
        <p style="text-align:center; margin-top:1rem; font-size:0.9rem; color:#666;">
            Ja tem conta? <a href="/login" style="color:#e94560;">Entrar</a>
        </p>
    </div>
</div>
</body>
</html>
