<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; color: #333; }
        nav { background: #1a1a2e; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
        nav .brand { color: #e94560; font-size: 1.5rem; font-weight: 700; text-decoration: none; }
        nav a { color: #ccc; text-decoration: none; margin-left: 1.2rem; font-size: 0.95rem; }
        nav a:hover { color: #fff; }
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
        .card { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); padding: 1.5rem; margin-bottom: 1.5rem; }
        .btn { display: inline-block; padding: 0.5rem 1.2rem; border-radius: 6px; border: none; cursor: pointer; font-size: 0.9rem; text-decoration: none; }
        .btn-primary { background: #e94560; color: #fff; }
        .btn-primary:hover { background: #c73652; }
        .btn-secondary { background: #6c757d; color: #fff; }
        .btn-secondary:hover { background: #545b62; }
        .btn-danger { background: #dc3545; color: #fff; }
        .btn-sm { padding: 0.3rem 0.8rem; font-size: 0.8rem; }
        .alert { padding: 0.8rem 1rem; border-radius: 6px; margin-bottom: 1rem; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-danger { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 0.75rem 1rem; border-bottom: 1px solid #e9ecef; }
        th { background: #f8f9fa; font-weight: 600; color: #555; }
        tr:hover td { background: #f8f9fa; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 500; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 0.55rem 0.8rem; border: 1px solid #ced4da; border-radius: 6px; font-size: 0.95rem; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #e94560; }
        .error-msg { color: #dc3545; font-size: 0.82rem; margin-top: 0.2rem; }
        .badge { display: inline-block; padding: 0.25rem 0.6rem; border-radius: 20px; font-size: 0.78rem; font-weight: 600; }
        .badge-admin { background: #fff3cd; color: #856404; }
        .badge-user { background: #d1ecf1; color: #0c5460; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: #fff; border-radius: 10px; padding: 1.5rem; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .stat-card .number { font-size: 2.5rem; font-weight: 700; color: #e94560; }
        .stat-card .label { color: #888; font-size: 0.9rem; margin-top: 0.3rem; }
        .eventos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
        .evento-card { background: #fff; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; transition: transform 0.2s; }
        .evento-card:hover { transform: translateY(-3px); }
        .evento-card-header { background: #1a1a2e; padding: 1rem 1.2rem; }
        .evento-card-header h3 { color: #fff; font-size: 1rem; }
        .evento-card-body { padding: 1rem 1.2rem; }
        .evento-card-body p { font-size: 0.88rem; color: #666; margin-bottom: 0.4rem; }
        .evento-card-footer { padding: 0.8rem 1.2rem; border-top: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .vagas { font-size: 0.85rem; color: #888; }
        h1 { font-size: 1.6rem; margin-bottom: 1.5rem; color: #1a1a2e; }
        h2 { font-size: 1.3rem; margin-bottom: 1rem; color: #1a1a2e; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
<div th:fragment="navbar">
    <nav>
        <a href="/" class="brand">Role</a>
        <div>
            <a href="/eventos">Eventos</a>
            <span sec:authorize="isAuthenticated()">
                <a href="/minhas-presencas">Minhas Presencas</a>
                <a href="/dashboard">Dashboard</a>
            </span>
            <span sec:authorize="hasRole('ADMIN')">
                <a href="/admin">Admin</a>
            </span>
            <span sec:authorize="isAuthenticated()">
                <form id="logout-form" th:action="@{/logout}" method="post" style="display:inline;">
                    <button type="submit" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:0.95rem;margin-left:1.2rem;">Sair</button>
                </form>
            </span>
            <span sec:authorize="!isAuthenticated()">
                <a href="/login">Entrar</a>
                <a href="/cadastro">Cadastrar</a>
            </span>
        </div>
    </nav>
</div>
</body>
</html>
