# ─── Banco H2 em memória (local) ──────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:roledb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration-h2

# ─── RabbitMQ local ───────────────────────────────────────────────────────────
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# ─── Mensageria ───────────────────────────────────────────────────────────────
role.messaging.exchange=role.exchange
role.messaging.queue=role.presenca.queue
role.messaging.routing-key=presenca.confirmada


# ─── Senhas seed ──────────────────────────────────────────────────────────────
app.seed.admin-password=admin@Role2025
app.seed.user-password=user@Role2025
